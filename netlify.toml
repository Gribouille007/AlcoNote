# Netlify build config.
#
# AlcoNote is a static PWA. The proto/dist/*.js files are precompiled from
# proto/*.jsx and committed to the repository, so the deploy works without
# any build step at all. We still run `npm run build` here so any
# .jsx-source-only push (e.g. a Netlify dashboard re-deploy without
# committed dist/) regenerates the bundles.

[build]
  publish = "."
  command = "npm run build"

[build.environment]
  NODE_VERSION = "20"
  NPM_FLAGS = "--no-audit --no-fund"

# Security headers. X-Frame-Options and X-Content-Type-Options are only honoured
# as HTTP headers (a <meta http-equiv> is ignored by browsers and logs a console
# error), so they live here rather than in index.html. The Content-Security-Policy
# stays as a <meta> in index.html. These headers ride along with the responses the
# service worker caches, so protection is preserved offline.
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
