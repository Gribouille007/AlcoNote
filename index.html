<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>AlcoNote — Suivi de Consommation d'Alcool</title>
  <meta name="description" content="Application PWA pour suivre votre consommation d'alcool avec scanner de codes-barres, statistiques détaillées et fonctionnement hors ligne.">
  <meta name="keywords" content="alcool, consommation, suivi, PWA, scanner, statistiques, santé">
  <meta name="author" content="AlcoNote">

  <meta name="theme-color" content="#b67a3a">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="AlcoNote">

  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://unpkg.com; style-src 'self' 'unsafe-inline' https://unpkg.com https://fonts.googleapis.com; img-src 'self' data: https: blob:; connect-src 'self' https://world.openfoodfacts.org https://nominatim.openstreetmap.org https://api.upcitemdb.com https://api.barcodelookup.com https://api.timezonedb.com https://*.tile.openstreetmap.org https://tile.openstreetmap.org https://unpkg.com; font-src 'self' https://cdn.jsdelivr.net https://fonts.gstatic.com; media-src 'self' blob:; worker-src 'self' blob:; child-src 'self' blob:;">
  <meta http-equiv="X-Content-Type-Options" content="nosniff">
  <meta http-equiv="X-Frame-Options" content="DENY">

  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="assets/icons/icon-192x192.png">
  <link rel="icon" type="image/png" sizes="192x192" href="assets/icons/icon-192x192.png">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">

  <style>
    html, body {
      margin: 0; padding: 0;
      width: 100%;
      min-height: 100vh; min-height: 100dvh;
      font-family: "Geist", system-ui, sans-serif;
      transition: background 0.35s ease;
      overflow: hidden;
      overscroll-behavior: none;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    #root, .alco-shell {
      max-width: 100%;
    }
    /* Desktop: keep the app phone-width and let the warm gradient fill the rest */
    @media (min-width: 720px) {
      body {
        display: grid;
        place-items: center;
        padding: 24px 0;
      }
      .alco-shell {
        width: 420px !important;
        height: min(880px, calc(100dvh - 48px)) !important;
        min-height: 0 !important;
        border-radius: 28px;
        box-shadow: 0 30px 80px rgba(0,0,0,0.35),
                    0 0 0 1px oklch(30% 0.01 55 / 0.4);
      }
      html[data-theme="light"] .alco-shell {
        box-shadow: 0 30px 80px rgba(60,40,20,0.18),
                    0 0 0 1px oklch(70% 0.02 70 / 0.3);
      }
    }
    html[data-theme="dark"], body.theme-dark {
      background: radial-gradient(ellipse at top, oklch(22% 0.01 55), oklch(14% 0.008 50) 75%);
      color: oklch(96% 0.008 85);
    }
    html[data-theme="light"], body.theme-light {
      background: radial-gradient(ellipse at top, oklch(99% 0.006 85), oklch(93% 0.01 75) 75%);
      color: oklch(22% 0.012 55);
    }
    body {
      background: radial-gradient(ellipse at top, oklch(22% 0.01 55), oklch(14% 0.008 50) 75%);
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    /* Disable text selection across the whole app — the surface acts
       like a native UI, not a document. Inputs/textareas/contenteditable
       still allow selection so the user can type and edit values. */
    html, body, #root, .alco-shell {
      -webkit-user-select: none;
      -moz-user-select: none;
      -ms-user-select: none;
      user-select: none;
      -webkit-touch-callout: none;
    }
    input, textarea, [contenteditable="true"], [contenteditable=""] {
      -webkit-user-select: text;
      -moz-user-select: text;
      -ms-user-select: text;
      user-select: text;
      -webkit-touch-callout: default;
    }
    input, button, select, textarea { font-family: inherit; }
    /* hide scrollbars but keep scroll */
    *::-webkit-scrollbar { display: none; }
    * { scrollbar-width: none; }
    /* iOS-friendly date/time inputs */
    input[type="date"], input[type="time"] { min-height: 1.4em; }
    /* loading splash — only visible until the React tree mounts. The
       App component removes this element from the DOM as soon as it
       runs, so a transient empty-root state during a re-render can
       never expose the splash on top of the live UI. */
    #alco-splash {
      position: fixed; inset: 0; display: grid; place-items: center;
      pointer-events: none; z-index: -1;
      font-family: "Instrument Serif", serif; font-style: italic;
      color: oklch(55% 0.008 70); font-size: 22px; letter-spacing: -0.3px;
    }
    #root:not(:empty) ~ #alco-splash { display: none; }
  </style>

  <!-- React (production build — JSX is precompiled, see proto/dist/) -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"
    crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"
    crossorigin="anonymous"></script>

  <!-- Scanner / DB libraries -->
  <script src="https://cdn.jsdelivr.net/npm/quagga@0.12.1/dist/quagga.min.js"></script>
  <script src="https://unpkg.com/dexie@3.2.4/dist/dexie.js"></script>
</head>
<body>
  <div id="root"></div>
  <div id="alco-splash">AlcoNote</div>

  <!-- Legacy backend modules (logic only — UI removed) -->
  <script src="js/database.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/scanner/product-lookup.js"></script>
  <script src="js/scanner/camera-scanner.js"></script>

  <!-- Proto UI (precompiled from proto/*.jsx → proto/dist/*.js) -->
  <script src="proto/dist/shared.js"></script>
  <script src="proto/dist/data.js"></script>
  <script src="proto/dist/stats-charts.js"></script>
  <script src="proto/dist/categories.js"></script>
  <script src="proto/dist/history.js"></script>
  <script src="proto/dist/stats.js"></script>
  <script src="proto/dist/modals.js"></script>
  <script src="proto/dist/app.js"></script>

  <!-- Service worker registration -->
  <script>
    if ('serviceWorker' in navigator && location.protocol !== 'file:') {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').catch(() => {});
      });
    }
  </script>
</body>
</html>
