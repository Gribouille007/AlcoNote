<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>AlcoNote</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="description" content="AlcoNote — suivi éditorial de la consommation d'alcool. Catégories, historique et statistiques.">

<meta name="theme-color" content="#b8763b" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#1a1410" media="(prefers-color-scheme: dark)">

<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="AlcoNote">

<!--
  Strict CSP: no inline scripts, no eval. JSX is precompiled by `npm run build`
  into build/proto/*.js so we no longer ship the 3 MB Babel-standalone runtime.
  style-src keeps 'unsafe-inline' for the in-page <style> only — far lower
  risk than inline scripts and easy to harden later via a hash.
-->
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://unpkg.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: https: blob:; connect-src 'self'; font-src 'self' https://fonts.gstatic.com data:; media-src 'self' blob:; worker-src 'self' blob:;">
<meta http-equiv="X-Content-Type-Options" content="nosniff">
<meta http-equiv="X-Frame-Options" content="DENY">

<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="assets/icons/icon-192x192.png">
<link rel="icon" type="image/png" sizes="192x192" href="assets/icons/icon-192x192.png">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
  html, body { margin: 0; padding: 0; min-height: 100vh;
    font-family: "Geist", system-ui, sans-serif;
    transition: background 0.35s ease;
  }
  html[data-theme="dark"], body.theme-dark {
    background: radial-gradient(ellipse at top, oklch(22% 0.01 55), oklch(14% 0.008 50) 75%);
  }
  html[data-theme="light"], body.theme-light {
    background: radial-gradient(ellipse at top, oklch(99% 0.006 85), oklch(93% 0.01 75) 75%);
  }
  body { background: radial-gradient(ellipse at top, oklch(22% 0.01 55), oklch(14% 0.008 50) 75%); }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  input, button, select { font-family: inherit; }
  button.bare { background: none; border: none; padding: 0; margin: 0; color: inherit; font: inherit; cursor: pointer; }
  .phone-body ::-webkit-scrollbar { display: none; }
  .phone-body * { scrollbar-width: none; }
  /* Hide the desktop-canvas hint when running as installed PWA */
  @media (display-mode: standalone) { .desktop-hint { display: none !important; } }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js"
  integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L"
  crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"
  integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm"
  crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<!-- Order matters: shared globals first; then db; then components that read them. -->
<script src="build/proto/shared.js"></script>
<script src="build/proto/db.js"></script>
<script src="build/proto/data.js"></script>
<script src="build/proto/categories.js"></script>
<script src="build/proto/history.js"></script>
<script src="build/proto/stats-charts.js"></script>
<script src="build/proto/stats.js"></script>
<script src="build/proto/modals.js"></script>
<script src="build/proto/app.js"></script>
<script src="build/proto/bootstrap.js"></script>
</body>
</html>
